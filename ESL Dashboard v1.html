<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESL English Center — Quản lý trung tâm</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --font: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* Primary — Vivid Orange */
      --primary: #FF6B35;
      --primary-dark: #E55A2B;
      --primary-light: #FFF0EB;

      /* Secondary — Navy */
      --navy: #1E3A5F;
      --navy-dark: #152C49;
      --navy-light: #2A4A73;

      /* Neutrals */
      --gray-50: #F8FAFC;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-300: #CBD5E1;
      --gray-400: #94A3B8;
      --gray-500: #64748B;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1E293B;
      --gray-900: #0F172A;

      /* Semantic */
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      --info: #3B82F6;

      /* Layout */
      --bg: #F5F7FA;
      --card: #FFFFFF;
      --sidebar-bg: #1E3A5F;
      --r-card: 16px;
      --r-btn: 12px;
      --r-input: 10px;
      --shadow-sm: 0 1px 3px rgba(30,58,95,0.06);
      --shadow-md: 0 4px 12px rgba(30,58,95,0.08);
      --shadow-lg: 0 8px 24px rgba(30,58,95,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--gray-800);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body { overflow: hidden; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

    /* Animation */
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Selection */
    ::selection { background: rgba(255, 107, 53, 0.15); color: #1E293B; }

    /* Focus visible */
    :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }
    button:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    /* Table hover */
    table tbody tr { transition: background 0.1s; }

    /* Responsive helpers */
    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }
    }
    @media (min-width: 769px) {
      .show-mobile-only { display: none !important; }
    }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Tweaks Panel -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- App Components -->
  <script type="text/babel" src="esl-shared.jsx"></script>
  <script type="text/babel" src="esl-app.jsx"></script>
  <script type="text/babel" src="esl-dashboard.jsx"></script>
  <script type="text/babel" src="esl-management.jsx"></script>
  <script type="text/babel" src="esl-pages.jsx"></script>

  <!-- Mount -->
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
