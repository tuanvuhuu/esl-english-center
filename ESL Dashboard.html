<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESL English Center — Quản lý trung tâm</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --font: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      /* Primary */
      --primary: #FF6B35;
      --primary-dark: #E55A2B;
      --primary-light: #FFF0EB;
      --primary-15: rgba(255,107,53,0.15);
      /* Semantic */
      --success: #10B981; --success-light: #D1FAE5; --success-dark: #065F46;
      --warning: #F59E0B; --warning-light: #FEF3C7; --warning-dark: #92400E;
      --error: #EF4444; --error-light: #FEE2E2; --error-dark: #991B1B;
      --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1E40AF;
      /* Theme — Light */
      --bg: #F5F7FA;
      --card: #FFFFFF;
      --card-hover: #FAFBFC;
      --sidebar: #1E3A5F;
      --sidebar-hover: rgba(255,255,255,0.08);
      --sidebar-border: rgba(255,255,255,0.08);
      --sidebar-text: rgba(255,255,255,0.7);
      --header: #FFFFFF;
      --header-border: #E2E8F0;
      --text-1: #1E293B;
      --text-2: #475569;
      --text-3: #64748B;
      --text-4: #94A3B8;
      --text-5: #CBD5E1;
      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --input-bg: #FFFFFF;
      --input-bg-subtle: #F8FAFC;
      --hover-bg: #F8FAFC;
      --badge-bg: #F1F5F9;
      --badge-color: #475569;
      --table-header: #F8FAFC;
      --table-row-hover: #FAFBFC;
      --modal-backdrop: rgba(15,23,42,0.4);
      --shadow-sm: 0 1px 3px rgba(30,58,95,0.06);
      --shadow-md: 0 4px 12px rgba(30,58,95,0.08);
      --shadow-lg: 0 8px 24px rgba(30,58,95,0.12);
      --shadow-xl: 0 16px 40px rgba(30,58,95,0.18);
      --activity-warm: #FFFAF7;
      --chart-grid: #F1F5F9;
    }

    [data-theme="dark"] {
      --bg: #0B1120;
      --card: #16213A;
      --card-hover: #1C2B4A;
      --sidebar: #0A0F1E;
      --sidebar-hover: rgba(255,255,255,0.06);
      --sidebar-border: rgba(255,255,255,0.06);
      --header: #16213A;
      --header-border: #1E3050;
      --text-1: #E8ECF4;
      --text-2: #B0BFCF;
      --text-3: #8899AE;
      --text-4: #5C6F85;
      --text-5: #3A4D63;
      --border: #1E3050;
      --border-light: #192842;
      --input-bg: #1C2B4A;
      --input-bg-subtle: #16213A;
      --hover-bg: #1C2B4A;
      --badge-bg: #1E3050;
      --badge-color: #B0BFCF;
      --table-header: #192842;
      --table-row-hover: #1C2B4A;
      --modal-backdrop: rgba(0,0,0,0.6);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.35);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.45);
      --shadow-xl: 0 16px 40px rgba(0,0,0,0.55);
      --activity-warm: #1A1510;
      --chart-grid: #1E3050;
      --primary-light: #2A1A10;
      --success-light: #0A2E1F;
      --warning-light: #2A1F0A;
      --error-light: #2A0F0F;
      --info-light: #0F1A2A;
      --success-dark: #6EE7B7;
      --warning-dark: #FCD34D;
      --error-dark: #FCA5A5;
      --info-dark: #93C5FD;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%; font-family: var(--font);
      background: var(--bg); color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background 0.35s ease, color 0.35s ease;
    }
    body { overflow: hidden; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-5); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-4); }
    ::selection { background: rgba(255,107,53,0.18); color: var(--text-1); }
    :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }

    /* ─── Animations ─── */
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.94) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(24px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-24px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .page-enter { animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1) both; }
    .stagger-1 { animation-delay: 0ms; }
    .stagger-2 { animation-delay: 60ms; }
    .stagger-3 { animation-delay: 120ms; }
    .stagger-4 { animation-delay: 180ms; }
    .stagger-5 { animation-delay: 240ms; }
    .stagger-6 { animation-delay: 300ms; }

    .skeleton {
      background: linear-gradient(90deg, var(--border-light) 25%, var(--border) 50%, var(--border-light) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite;
      border-radius: 8px;
    }

    @media (max-width: 768px) { .hide-mobile { display: none !important; } }
    @media (min-width: 769px) { .show-mobile-only { display: none !important; } }
  </style>
